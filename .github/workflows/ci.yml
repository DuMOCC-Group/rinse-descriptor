name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --------------------------------------------------------------------------
  # pre-commit hooks
  # --------------------------------------------------------------------------
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run pre-commit (all files)
        run: uv run pre-commit run --all-files

  # --------------------------------------------------------------------------
  # Python – lint, type-check, test
  # --------------------------------------------------------------------------
  python:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # cctbx-base's Boost.Python bindings crash on Linux; skip ubuntu until
        # upstream fixes the wheel.
        include:
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - name: Install project (dev dependencies)
        run: uv sync --group dev

      - name: ruff lint
        run: uv run ruff check python/ tests/

      - name: ruff format check
        run: uv run ruff format --check python/ tests/

      - name: mypy
        run: uv run mypy python/rinse_descriptor/

      - name: pytest
        env:
          PYTHONFAULTHANDLER: "1"
        run: uv run pytest tests/ -v --tb=short --capture=sys

  # --------------------------------------------------------------------------
  # Build sdist + wheel (on push to main)
  # --------------------------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [python]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
